<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PDF Summarizer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0e;
    --surface: #141416;
    --border: #222226;
    --accent: #f0c060;
    --accent2: #e87040;
    --text: #f0ede8;
    --muted: #666670;
    --radius: 16px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px;
    overflow-x: hidden;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .glow {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,192,96,0.06) 0%, transparent 70%);
    top: -200px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }

  header {
    text-align: center;
  }

  .eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 3.8rem);
    font-weight: 900;
    line-height: 1.05;
    background: linear-gradient(135deg, var(--text) 40%, var(--accent) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    margin-top: 14px;
    color: var(--muted);
    font-size: 15px;
    font-weight: 300;
  }

  /* Drop Zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 56px 32px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.25s, background 0.25s, transform 0.2s;
    position: relative;
    overflow: hidden;
  }

  .drop-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(240,192,96,0.04), rgba(232,112,64,0.03));
    opacity: 0;
    transition: opacity 0.3s;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: #18181c;
    transform: translateY(-2px);
  }

  .drop-zone:hover::before, .drop-zone.drag-over::before {
    opacity: 1;
  }

  .drop-icon {
    width: 64px; height: 64px;
    margin: 0 auto 20px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    box-shadow: 0 8px 32px rgba(240,192,96,0.25);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .drop-zone:hover .drop-icon {
    transform: scale(1.08) rotate(-4deg);
    box-shadow: 0 12px 40px rgba(240,192,96,0.35);
  }

  .drop-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .drop-sub {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
  }

  .drop-sub span {
    color: var(--accent);
    font-weight: 500;
    text-decoration: underline;
    cursor: pointer;
  }

  #file-input { display: none; }

  /* File selected state */
  .file-info {
    display: none;
    align-items: center;
    gap: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 22px;
  }

  .file-info.visible { display: flex; }

  .file-icon {
    width: 44px; height: 44px; flex-shrink: 0;
    background: linear-gradient(135deg, #e05040, #c03020);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .file-details { flex: 1; min-width: 0; }
  .file-name { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-size { color: var(--muted); font-size: 12px; margin-top: 2px; }

  .remove-btn {
    background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px;
    padding: 4px; border-radius: 6px; transition: color 0.2s;
  }
  .remove-btn:hover { color: #e05040; }

  /* Summarize button */
  .btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #0c0c0e;
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(240,192,96,0.25);
  }

  .btn:hover:not(:disabled) {
    opacity: 0.92;
    transform: translateY(-1px);
    box-shadow: 0 8px 32px rgba(240,192,96,0.35);
  }

  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* Loading */
  .loading {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    text-align: center;
  }

  .loading.visible { display: flex; }

  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { color: var(--muted); font-size: 14px; }
  .loading-dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
  }

  /* Result */
  .result {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    animation: fadeUp 0.5s ease forwards;
  }

  .result.visible { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .copy-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; padding: 6px 14px;
    border-radius: 8px; font-size: 12px; font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }
  .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

  .result-body {
    padding: 28px 24px;
    font-size: 15px;
    font-weight: 300;
    line-height: 1.85;
    color: #ccc9c0;
    white-space: pre-wrap;
  }

  /* Error */
  .error {
    display: none;
    background: rgba(224,80,64,0.08);
    border: 1px solid rgba(224,80,64,0.3);
    border-radius: var(--radius);
    padding: 18px 22px;
    color: #e08070;
    font-size: 14px;
  }
  .error.visible { display: block; }

  footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    font-weight: 300;
    padding-top: 8px;
  }
</style>
</head>
<body>

<div class="glow"></div>

<div class="container">
  <header>
    <p class="eyebrow">AI-Powered</p>
    <h1>PDF Summarizer</h1>
    <p class="subtitle">Drop any PDF and get an instant intelligent summary</p>
  </header>

  <!-- Drop Zone -->
  <div class="drop-zone" id="drop-zone" onclick="handleDropZoneClick(event)">
    <div class="drop-icon">📄</div>
    <p class="drop-title">Drop your PDF here</p>
    <p class="drop-sub">or <span id="browse-link">browse files</span></p>
    <input type="file" id="file-input" accept=".pdf" />
  </div>

  <!-- File Info -->
  <div class="file-info" id="file-info">
    <div class="file-icon">📕</div>
    <div class="file-details">
      <div class="file-name" id="file-name">—</div>
      <div class="file-size" id="file-size">—</div>
    </div>
    <button class="remove-btn" onclick="clearFile()" title="Remove">✕</button>
  </div>

  <!-- Summarize Button -->
  <button class="btn" id="summarize-btn" disabled onclick="summarize()">
    ✦ Summarize PDF
  </button>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p class="loading-text">Reading your document<span class="loading-dots"></span></p>
  </div>

  <!-- Error -->
  <div class="error" id="error"></div>

  <!-- Result -->
  <div class="result" id="result">
    <div class="result-header">
      <span class="result-label">✦ Summary</span>
      <button class="copy-btn" onclick="copyResult()">Copy</button>
    </div>
    <div class="result-body" id="result-body"></div>
  </div>

  <footer>Powered by Claude · Your files are never stored</footer>
</div>

<script>
  let selectedFile = null;

  const dropZone   = document.getElementById('drop-zone');
  const fileInput  = document.getElementById('file-input');
  const fileInfo   = document.getElementById('file-info');
  const fileName   = document.getElementById('file-name');
  const fileSize   = document.getElementById('file-size');
  const btn        = document.getElementById('summarize-btn');
  const loading    = document.getElementById('loading');
  const result     = document.getElementById('result');
  const resultBody = document.getElementById('result-body');
  const errorBox   = document.getElementById('error');

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
  }

  function setFile(file) {
    if (!file || file.type !== 'application/pdf') {
      showError('Please select a valid PDF file.');
      return;
    }
    selectedFile = file;
    fileName.textContent = file.name;
    fileSize.textContent = formatSize(file.size);
    dropZone.style.display = 'none';
    fileInfo.classList.add('visible');
    btn.disabled = false;
    result.classList.remove('visible');
    errorBox.classList.remove('visible');
  }

  function clearFile() {
    selectedFile = null;
    fileInput.value = '';
    dropZone.style.display = '';
    fileInfo.classList.remove('visible');
    btn.disabled = true;
    result.classList.remove('visible');
    errorBox.classList.remove('visible');
  }

  function showError(msg) {
    errorBox.textContent = '⚠ ' + msg;
    errorBox.classList.add('visible');
  }

  fileInput.addEventListener('change', e => {
    if (e.target.files[0]) setFile(e.target.files[0]);
  });

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });

  async function summarize() {
    if (!selectedFile) return;

    btn.disabled = true;
    loading.classList.add('visible');
    result.classList.remove('visible');
    errorBox.classList.remove('visible');

    try {
      const base64 = await toBase64(selectedFile);

      const response = await fetch('/summarize', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pdf: base64 })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data?.error || 'API request failed');
      }

      const text = data.summary || 'No summary returned.';
      resultBody.textContent = text;
      result.classList.add('visible');

    } catch (err) {
      showError(err.message || 'Something went wrong. Please try again.');
    } finally {
      loading.classList.remove('visible');
      btn.disabled = false;
    }
  }

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = () => resolve(reader.result.split(',')[1]);
      reader.onerror = () => reject(new Error('Failed to read file'));
      reader.readAsDataURL(file);
    });
  }

  function handleDropZoneClick(e) {
    fileInput.click();
  }

  document.getElementById('browse-link').addEventListener('click', function(e) {
    e.stopPropagation();
    fileInput.click();
  });

  function copyResult() {
    navigator.clipboard.writeText(resultBody.textContent).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }
</script>
</body>
</html>
